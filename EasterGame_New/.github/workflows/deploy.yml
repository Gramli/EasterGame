name: Deploy Easter Game to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'EasterGame_New/**'

permissions:
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: EasterGame_New/package-lock.json

      - name: Install dependencies
        working-directory: EasterGame_New
        run: npm ci

      - name: Build static site
        working-directory: EasterGame_New
        run: npm run build
        # Output goes to EasterGame_New/dist — a fully self-contained static site.

      - uses: actions/upload-pages-artifact@v3
        with:
          path: EasterGame_New/dist

      - id: deploy
        uses: actions/deploy-pages@v4
